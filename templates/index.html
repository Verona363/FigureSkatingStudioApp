<!DOCTYPE html>
<html>

<head>
  <title>Figure Skating Studio</title>
</head>

<body>
  <h1> Figure Skating Studio</h1>

  {% if session.username %}
  <p>
    Olet kirjautunut nimellä {{ session.username }}, id number is {{session.user_id}}
  </p>
  {% endif %}

  <p>
    <a href="/login">Kirjaudu sisään</a>
    <a href="/register">Create ID</a>
    <a href="/logout">Log out</a>
  </p>

  <p>
    <a href="/new_item"> Add a new training session </a>
  </p>

  <h2>Announcements</h2>

  <ul>
    {% for item in items %}
    <li><a href="/item/{{ item.id }}">{{ item.title }}</a></li>
    {% endfor %}
  </ul>
</body>

</html>
